<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>react-nested-grid example</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Roboto,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .app-layout {
        display: flex;
        height: 100vh;
      }

      .app-sidebar {
        width: 220px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 20px;
        border-right: 1px solid #e2e8f0;
        background: #fff;
      }

      .app-title {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        color: #0f172a;
      }

      .app-nav {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .app-nav-btn {
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: #475569;
        font-size: 13px;
        cursor: pointer;
        transition:
          background 100ms,
          color 100ms;
      }

      .app-nav-btn:hover {
        background: #f1f5f9;
        color: #0f172a;
      }

      .app-nav-btn--active {
        background: #eef2ff;
        color: #4338ca;
        font-weight: 600;
      }

      .app-main {
        flex: 1;
        min-width: 0;
        padding: 24px;
        overflow: auto;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
